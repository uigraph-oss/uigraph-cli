syntax = "proto3";

package analytics.v1;

option go_package = "github.com/company/analytics-service/gen/go/analytics/v1;analyticsv1";

// Analytics Service
service AnalyticsService {
  // Track an event
  rpc TrackEvent(TrackEventRequest) returns (TrackEventResponse);
  
  // Get metrics for a time range
  rpc GetMetrics(GetMetricsRequest) returns (GetMetricsResponse);
  
  // Stream real-time events
  rpc StreamEvents(StreamEventsRequest) returns (stream Event);
}

message TrackEventRequest {
  string event_type = 1;
  string entity_id = 2;
  map<string, string> properties = 3;
  int64 timestamp = 4;
}

message TrackEventResponse {
  string event_id = 1;
  bool success = 2;
}

message GetMetricsRequest {
  string dashboard_id = 1;
  TimeRange time_range = 2;
}

message GetMetricsResponse {
  repeated Metric metrics = 1;
}

message StreamEventsRequest {
  repeated string event_types = 1;
  string entity_id = 2;
}

message Event {
  string id = 1;
  string event_type = 2;
  string entity_id = 3;
  int64 timestamp = 4;
  map<string, string> properties = 5;
}

message Metric {
  string name = 1;
  double value = 2;
  string unit = 3;
  TrendDirection trend = 4;
}

message TimeRange {
  int64 start = 1;
  int64 end = 2;
}

enum TrendDirection {
  TREND_DIRECTION_UNSPECIFIED = 0;
  TREND_DIRECTION_UP = 1;
  TREND_DIRECTION_DOWN = 2;
  TREND_DIRECTION_STABLE = 3;
}
