openapi: 3.0.3
info:
  title: Mobile API
  description: Backend API for mobile applications
  version: 2.0.0

paths:
  /mobile/health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK

  /mobile/notifications:
    get:
      summary: Get notifications
      responses:
        '200':
          description: Notification list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'

components:
  schemas:
    Notification:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        body:
          type: string
        timestamp:
          type: string
          format: date-time
