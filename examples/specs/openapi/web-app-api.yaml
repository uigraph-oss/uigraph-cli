openapi: 3.0.3
info:
  title: Web App API
  description: Backend API for the customer-facing web application
  version: 2.1.0
  contact:
    name: Frontend Team
    email: frontend@company.com

servers:
  - url: https://app.company.com/api
    description: Production

paths:
  /users/me:
    get:
      summary: Get current user profile
      operationId: getCurrentUser
      tags:
        - users
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /products:
    get:
      summary: List products
      operationId: listProducts
      tags:
        - products
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductList'

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
    
    ProductList:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        page:
          type: integer
        total:
          type: integer
    
    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

security:
  - bearerAuth: []
