openapi: 3.0.3
info:
  title: Booking Service API
  description: API for managing booking lifecycle and availability
  version: 1.0.0
  contact:
    name: Platform Team
    email: platform@company.com

servers:
  - url: https://api.company.com/v1
    description: Production server
  - url: https://staging-api.company.com/v1
    description: Staging server

paths:
  /bookings:
    get:
      summary: List all bookings
      operationId: listBookings
      tags:
        - bookings
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, cancelled]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
    
    post:
      summary: Create a new booking
      operationId: createBooking
      tags:
        - bookings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
      responses:
        '201':
          description: Booking created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          description: Invalid request

  /bookings/{bookingId}:
    get:
      summary: Get booking by ID
      operationId: getBooking
      tags:
        - bookings
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Booking details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '404':
          description: Booking not found
    
    patch:
      summary: Update booking
      operationId: updateBooking
      tags:
        - bookings
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBookingRequest'
      responses:
        '200':
          description: Booking updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'

  /availability:
    get:
      summary: Check availability
      operationId: checkAvailability
      tags:
        - availability
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Availability information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Availability'

components:
  schemas:
    Booking:
      type: object
      required:
        - id
        - status
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, confirmed, cancelled]
        customerName:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    
    CreateBookingRequest:
      type: object
      required:
        - customerName
        - startDate
        - endDate
      properties:
        customerName:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
    
    UpdateBookingRequest:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, cancelled]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
    
    Availability:
      type: object
      properties:
        available:
          type: boolean
        slots:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              capacity:
                type: integer

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
